<style>
:root {
	--TryMe-w: 300px;
	--TryMe-h: 300px;
}
gsui-wavetable-graph {
	width: 100%;
	height: 100%;
}
</style>

<div id="TryComponent">
	<gsui-wavetable-graph resolution="300 300"></gsui-wavetable-graph>
</div>

<div id="TryControls">
	<div>
		<input id="waveSelected" type="range" min="0" value="0"/>
	</div>
	<div>
		<input id="morph" type="range" min="0" max="1" value="0" step="0.01"/>
	</div>
	<div>
		<button id="rmMorph">no morph</button>
	</div>
</div>

<script>
const el = $( "gsui-wavetable-graph" );
const inpMorph = $( "#morph" );
const inpWaveSelected = $( "#waveSelected" );
const inpRmMorph = $( "#rmMorph" );
const wt = {
	0: {
		index: 0,
		curve: GSUmathWaveTriangle( 5 ),
	},
	2: {
		index: .6666,
		curve: GSUmathWaveSine( 64 ),
	},
	3: {
		index: 1,
		curve: GSUmathWaveSquare( 64 ),
	},
	1: {
		index: .3333,
		curve: GSUmathWaveSawtooth( 64 ),
	},
};

inpWaveSelected
	.$setAttr( "max", Object.keys( wt ).length - 1 )
	.$oninput( () => el.$setAttr( "waveselected", `${ inpWaveSelected.$value() }` ).$message( GSEV_WAVETABLEGRAPH_DRAW ) );
inpRmMorph.$onclick( () => el.$setAttr( "morphing", -1 ) );
inpMorph.$oninput( () => el.$setAttr( "morphing", inpMorph.$value() ) );

el.$setAttr( "waveselected", "0" )
	.$message( GSEV_WAVETABLEGRAPH_DATA, wt )
	.$message( GSEV_WAVETABLEGRAPH_DRAW );
</script>
