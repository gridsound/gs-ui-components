<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1"/>
<link rel="shortcut icon" href="../assets/ico.svg"/>
<link rel="stylesheet" href="../assets/fonts/fonts.css"/>

<!-- ....................................................................... -->
<link rel="stylesheet" href="../gsui.css"/>
<link rel="stylesheet" href="../gsui-gray.css"/>
<link rel="stylesheet" href="../gsui-white.css"/>
<link rel="stylesheet" href="../gsui-flex.css"/>
<link rel="stylesheet" href="../test-assets/test.css"/>

<!-- ....................................................................... -->
<link rel="stylesheet" href="../gsuiIcon/gsuiIcon.css"/>

<!-- ....................................................................... -->
<link rel="stylesheet" href="../gsuiAnalyserHist/gsuiAnalyserHist.css"/>

<!-- ....................................................................... -->
<style>
body {
	--test-content-w: 512px;
	--test-content-h: 256px;
}
.prop {
	display: flex;
	align-items: center;
}
.prop span,
.prop b {
	margin-left: 1ch;
}
</style>
</head>
<body>

<!-- ....................................................................... -->
<div id="TEST">
	<gsui-analyser-td pinch="1" amp="2"></gsui-analyser-td>
</div>
<div id="TEST-CTRLS">
	<button id="play" disabled>play</button>
	<button id="stop">stop</button>
	<button id="freeze">freeze</button>
	<div class="prop">
		<input id="ampInput" type="range" value="1" min="0.1" max="16" step=".01" />
		<span>amp</span>
		<b>1</b>
	</div>
	<div class="prop">
		<input id="pinchInput" type="range" value="1" min="0" max="1" step=".01" />
		<span>pinch</span>
		<b>1</b>
	</div>
	<div class="prop">
		<input id="smoothInput" type="range" value="0" min="0" max="1" step=".01" />
		<span>smooth</span>
		<b>1</b>
	</div>
</div>

<!-- ....................................................................... -->
<script src="../gs-utils/gs-utils.js"></script>
<script src="../gs-utils/gs-utils-dom.js"></script>
<script src="../gs-utils/gs-utils-math.js"></script>
<script src="../gs-utils/gs-utils-func.js"></script>
<script src="../gs-utils/gs-utils-jquery.js"></script>
<script src="../gs-utils/gs-utils-checkType.dev.js"></script>
<script src="../gs-utils/gs-utils-audio-nodes.dev.js"></script>
<script src="../test-assets/test.js"></script>
<script src="../gsui-constantes.js"></script>
<script src="../gsui0ne/gsui0ne.js"></script>

<!-- ....................................................................... -->
<script src="gsuiAnalyserTd.js"></script>

<!-- ....................................................................... -->
<script>
const play = $( "#play" );
const stop = $( "#stop" );
const freeze = $( "#freeze" );
const analyserTd = $( "gsui-analyser-td" );
const ampInput = $( "#ampInput" );
const pinchInput = $( "#pinchInput" );
const smoothInput = $( "#smoothInput" );
const ctx = GSUaudioContext();
const an = GSUaudioAnalyser( ctx );
const fftSize = 1024;
const anData = new Float32Array( fftSize / 2 );
let buffer;
let absn;
let frozen = false;

an.fftSize = fftSize;
an.smoothingTimeConstant = 0;

fetch( "../test-assets/Cymatics-IcedOut.wav" )
	.then( res => res.arrayBuffer() )
	.then( arr => ctx.decodeAudioData( arr ) )
	.then( buf => {
		buffer = buf;
		play.$disabled( false );
	} );

freeze.$on( "pointerdown", () => { frozen = !frozen; } );
freeze.$on( "pointerup", () => { frozen = false; } );
stop.$onclick( () => { absn?.stop(); } );
play.$onclick( () => {
	stop.$click();
	absn = GSUaudioBufferSource( ctx );
	absn.buffer = buffer;
	absn.loop = true;
	absn.connect( an );
	absn.connect( ctx.destination );
	absn.start();
} );

ampInput.$oninput( e => analyserTd.$setAttr( "amp", e.target.value ) );
pinchInput.$oninput( e => analyserTd.$setAttr( "pinch", e.target.value ) );
smoothInput.$oninput( e => analyserTd.$setAttr( "smooth", e.target.value ) );
$( "#testCtrls" ).$oninput( e => $( e.target ).$next().$next().$text( e.target.value ) );

function frame() {
	an.getFloatTimeDomainData( anData );
	if ( !frozen ) {
		analyserTd.$get( 0 ).$draw( anData );
	}
}

GSUsetInterval( frame, 0 );
</script>
</body>
</html>
