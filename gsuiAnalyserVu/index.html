<style>
:root {
	--TryMe-w: 32px;
	--TryMe-h: 160px;
}
#TryControls input[ type="range" ] {
	width: 50px;
}
.prop {
	display: flex;
	align-items: center;
}
.prop span,
.prop b {
	margin-left: 1ch;
}
</style>

<div id="TryComponent">
	<gsui-analyser-vu max="120"></gsui-analyser-vu>
</div>

<div id="TryControls">
	<gsui-com-button id="play" text="kick" disabled></gsui-com-button><br/>
	<input type="range" id="hardValue" min="0" max="2" step=".01" value="0"/>
</div>

<script>
const play = $( "#play" );
const analyserVu = $( "gsui-analyser-vu" );
const ctx = GSUaudioContext();
const anL = GSUaudioAnalyser( ctx );
const anR = GSUaudioAnalyser( ctx );
const split = GSUaudioChannelSplitter( ctx, 2 );
const fftSize = 1024;
const anDataL = new Float32Array( fftSize / 2 );
const anDataR = new Float32Array( fftSize / 2 );
let buffer;
let absn;

anL.fftSize =
anR.fftSize = fftSize;
split.connect( anL, 0 );
split.connect( anR, 1 );

let hardVal = 0;
$( "#hardValue" ).$oninput( e => hardVal = +e.target.value );

fetch( "test-assets/808kick.wav" )
	.then( res => res.arrayBuffer() )
	.then( arr => ctx.decodeAudioData( arr ) )
	.then( buf => {
		buffer = buf;
		play.$disabled( false );
	} );

play.$onclick( () => {
	hardVal = null;
	absn = GSUaudioBufferSource( ctx );
	absn.buffer = buffer;
	absn.connect( split );
	absn.connect( ctx.destination );
	absn.start();
} );

function frame() {
	if ( GSUisNum( hardVal ) ) {
		analyserVu.$get( 0 ).$draw( [ hardVal ], [ hardVal ] );
	} else {
		anL.getFloatTimeDomainData( anDataL );
		anR.getFloatTimeDomainData( anDataR );
		analyserVu.$get( 0 ).$draw( anDataL, anDataR );
	}
}

GSUsetInterval( frame, 0 );
</script>
