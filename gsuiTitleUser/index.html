<style>
:root {
	--TryMe-resize: horizontal;
}
#TryComponent {
	background: #444;
}
#TryControls label {
	display: flex;
	align-content: center;
	gap: 8px;
}
</style>

<div id="TryComponent">
	<gsui-titleuser avatar="test-assets/avatar.jpg"></gsui-titleuser>
</div>

<div id="TryControls">
	<label><input type="checkbox" id="readonly">toggle readonly</button></label>
	<label><input type="checkbox" id="connected">toggle connected</button></label>
	<label><input type="checkbox" id="connecting">toggle connecting</button></label>
	<label><input type="checkbox" id="disconnecting">toggle disconnecting</button></label>
	<label><input type="checkbox" id="saving">toggle saving</button></label>
	<label><input type="checkbox" id="saved">toggle saved</button></label>
	<label><input type="checkbox" id="just-saved">toggle just-saved</button></label>
	<label><input type="checkbox" id="longUser">toggle long username</button></label>
	<label><input type="checkbox" id="cmpName">toggle cmpname</button></label>
</div>

<script>
const el = $( "gsui-titleuser" );
const readonly = $( "#readonly" );
const connected = $( "#connected" );
const connecting = $( "#connecting" );
const disconnecting = $( "#disconnecting" );
const saving = $( "#saving" );
const saved = $( "#saved" );
const justSaved = $( "#just-saved" );
const cmpName = $( "#cmpName" );
const longUser = $( "#longUser" );

readonly.$onclick( () => el.$togAttr( "readonly" ) );
connected.$onclick( () => el.$togAttr( "connected" ) );
connecting.$onclick( () => el.$togAttr( "connecting" ) );
disconnecting.$onclick( () => el.$togAttr( "disconnecting" ) );
saving.$onclick( () => el.$togAttr( "saving" ) );
saved.$onclick( () => el.$togAttr( "saved" ) );
justSaved.$onclick( () => el.$togAttr( "just-saved" ) );
cmpName.$onclick( () => el.$setAttr( "cmpname", el.$getAttr( "cmpname" ) ? false : "Angry and evil nasty potato" ) );
longUser.$onclick( () => {
	const isShort = el.$getAttr( "name" ) === "John";

	el.$setAttr( {
		name: isShort ? "John Wick (the hitman)" : "John",
		username: isShort ? "baba_yaga_yippie_kay_yay" : "baba_yaga",
	} );
} );

const logout0 = () => new Promise( ( res, rej ) => GSUsetTimeout( rej, 1 ) );
const logout1 = () => new Promise( ( res, rej ) => GSUsetTimeout( res, 1 ) );

el.$get( 0 ).$setLogoutCallbackPromise( logout0 );
// el.$get( 0 ).$setLogoutCallbackPromise( logout1 );

el.$listen( {
	[ GSEV_TITLEUSER_RENAME ]: ( _, name ) => {
		lg( `rename: [${ name }]` );
		el.$setAttr( "cmpname", name );
	},
} );

longUser.$click();
longUser.$click();
connected.$click();
cmpName.$click();
</script>
