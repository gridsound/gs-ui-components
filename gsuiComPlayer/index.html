<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1"/>
<link rel="shortcut icon" href="../assets/ico.svg"/>
<link rel="stylesheet" href="../assets/fonts/fonts.css"/>

<!-- ....................................................................... -->
<link rel="stylesheet" href="../gsui.css"/>
<link rel="stylesheet" href="../gsui-gray.css"/>
<link rel="stylesheet" href="../gsui-white.css"/>
<link rel="stylesheet" href="../gsui-flex.css"/>
<link rel="stylesheet" href="../test-assets/test.css"/>

<!-- ....................................................................... -->
<link rel="stylesheet" href="../gsuiIcon/gsuiIcon.css"/>
<link rel="stylesheet" href="../gsuiDropdown/gsuiDropdown.css"/>
<link rel="stylesheet" href="../gsuiActionMenu/gsuiActionMenu.css"/>

<!-- ....................................................................... -->
<link rel="stylesheet" href="gsuiComPlayer.css"/>

<!-- ....................................................................... -->
<style>
body {
	--test-content-w: 500px;
	--test-content-h: 310px;
	--test-content-resize: horizontal;
}
</style>
</head>
<body>

<!-- ....................................................................... -->
<div id="TEST">
	<gsui-com-player
		__rendered
		duration="3600"
		bpm="120"
		actions="open visible fork delete"
	></gsui-com-player>
</div>
<div id="TEST-CTRLS">
	<div><label><input id="itsmine" type="checkbox" /> its mine</label></div>
	<div><label><input id="private" type="checkbox" /> private</label></div>
	<div><label><input id="opensource" type="checkbox" /> open source</label></div>
	<div><label><input id="editable" type="checkbox" /> editable</label></div>
	<div><label><input id="titled" type="checkbox" /> titled</label></div>
	<div><label><input id="liked" type="checkbox" /> liked</label></div>
	<div><label><input id="rendered" type="checkbox" /> rendered</label></div>
	<div><input id="bpm" type="range" min="1" max="999" value="60" /></div>
	<div><input id="duration" type="range" min="0" max="3600" value="0" /></div>
	<div><input id="currentTime" type="range" min="0" max="3600" value="0" /></div>
</div>

<!-- ....................................................................... -->
<script src="../gs-utils/gs-utils.js"></script>
<script src="../gs-utils/gs-utils-dom.js"></script>
<script src="../gs-utils/gs-utils-math.js"></script>
<script src="../gs-utils/gs-utils-func.js"></script>
<script src="../gs-utils/gs-utils-jquery.js"></script>
<script src="../gs-utils/gs-utils-checkType.dev.js"></script>
<script src="../test-assets/test.js"></script>
<script src="../gsui-constantes.js"></script>
<script src="../gsui0ne/gsui0ne.js"></script>

<!-- ....................................................................... -->
<script src="../gsuiDropdown/getAbsPos.js"></script>
<script src="../gsuiDropdown/gsuiDropdown.js"></script>
<script src="../gsuiActionMenu/gsuiActionMenu.js"></script>

<!-- ....................................................................... -->
<script src="gsuiComPlayer.html.js"></script>
<script src="gsuiComPlayer.js"></script>

<!-- ....................................................................... -->
<script>
const el = $( "gsui-com-player" );
const likedInp = GSUdomQS( "#liked" );
const titledInp = GSUdomQS( "#titled" );
const itsmineInp = GSUdomQS( "#itsmine" );
const privateInp = GSUdomQS( "#private" );
const renderedInp = GSUdomQS( "#rendered" );
const opensourceInp = GSUdomQS( "#opensource" );
const editableInp = GSUdomQS( "#editable" );
const bpmInp = GSUdomQS( "#bpm" );
const durationInp = GSUdomQS( "#duration" );
const currentTimeInp = GSUdomQS( "#currentTime" );

el.$get( 0 ).$setLikeCallbackPromise( ( el, action ) => {
	return GSUwait( .5 ).then( () => {
		lg( action );
		// throw( "a fail" );
	} );
} );
el.$get( 0 ).$setRendersCallbackPromise( el => {
	return GSUwait( 1 ).then( () => {
		// throw( "a fail" );
		return "../test-assets/Cymatics-IcedOut.wav";
	} );
} );
el.$get( 0 ).$setDeleteCallbackPromise( _el => GSUwait( 1 ) );
el.$get( 0 ).$setRestoreCallbackPromise( _el => GSUwait( 1 ) );
el.$get( 0 ).$setVisibilityCallbackPromise( ( _el, _vis ) => GSUwait( 1 ) );

likedInp.onchange = () => el.$togAttr( "liked" );
titledInp.onchange = () => el.$setAttr( "name", el.$getAttr( "name" ) ? false : "Dopest song ever created" );
itsmineInp.onchange = () => el.$togAttr( "itsmine" );
privateInp.onchange = () => el.$togAttr( "private" );
renderedInp.onchange = () => el.$togAttr( "rendered" );
opensourceInp.onchange = () => el.$togAttr( "opensource" );
editableInp.onchange = () => el.$setAttr( "dawlink", editableInp.checked ? "https://daw.gridsound.com/5Up3rUu1d" : false );

// itsmineInp.click();
privateInp.click();
editableInp.click();

bpmInp.oninput = () => el.$setAttr( "bpm", bpmInp.value );
durationInp.oninput = () => el.$setAttr( "duration", durationInp.value );
currentTimeInp.oninput = () => el.$setAttr( "currenttime", currentTimeInp.value );

GSUdomListen( $body.$get( 0 ), {
	[ GSEV_COMPLAYER_PLAY ]: () => el.$getAttr( "playing" ), // ?
	[ GSEV_COMPLAYER_STOP ]: () => el.$rmAttr( "playing" ), // ?
	[ GSEV_COMPLAYER_ACTION ]: ( _, act ) => el.$rmAttr( `action:[${ act }]` ), // ?
} );
</script>
</body>
</html>
