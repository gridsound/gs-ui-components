<style>
:root {
	--TryMe-w: 340px;
	--TryMe-h: 180px;
}
</style>

<div id="TryComponent">
	<gsui-fx-waveshaper></gsui-fx-waveshaper>
</div>

<script>
const fx = $( "gsui-fx-waveshaper" );

fx.$listen( {
	[ GSEV_EFFECT_FX_LIVECHANGE ]: GSUnoop,
	[ GSEV_EFFECT_FX_CHANGEPROP ]: ( _, k, v ) => {
		switch ( k ) {
			case "curve":
				fx.$get( 0 ).$changeCurveData( v );
				break;
			case "symmetry":
			case "oversample":
				fx.$setAttr( k, v );
				break;
		}
	},
	[ GSEV_EFFECT_FX_CHANGEPROPS ]: ( _, p, obj ) => {
		switch ( p ) {
			case "symmetry":
				fx.$get( 0 ).$changeCurveData( obj.curve );
				fx.$setAttr( "symmetry", obj.symmetry );
				break;
		}
	},
} );
</script>
