<style>
:root {
	--TryMe-w: 300px;
	--TryMe-h: 300px;
}
gsui-dotline {
	background-color: #fff4;
}
#TryControls input[ type="number" ] {
	width: 42px;
}
</style>

<div id="TryComponent">
	<gsui-dotline beatlines viewbox="-50 -50 50 50"></gsui-dotline>
</div>

<div id="TryControls">
	<div>
		<label>
			<input id="movelinked" type="checkbox"/>
			<span>dots moving linked</span>
		</label>
	</div>
	<div>
		<label>
			<input id="xstep" type="number" step=".01" value="1"/>
			<span>x step</span>
		</label>
	</div>
	<div>
		<label>
			<input id="ystep" type="number" step=".01" value="1"/>
			<span>y step</span>
		</label>
	</div>
</div>

<script>
const line = $( "gsui-dotline" );

line.$listen( {
	[ GSEV_DOTLINE_CHANGE ]: ( _, obj ) => console.log( obj ),
} );

$( "#xstep" ).$onchange( e => line.$setAttr( "xstep", e.target.value ) );
$( "#ystep" ).$onchange( e => line.$setAttr( "ystep", e.target.value ) );
$( "#movelinked" ).$onchange( e => line.$setAttr( "movelinked", e.target.checked ) );

line.$get( 0 ).$setDotOptions( "1", { freezeX: true, deletable: false } );
line.$get( 0 ).$setDotOptions( "6", { freezeX: true, deletable: false } );
line.$get( 0 ).$change( {
	1: { x: -50, y: -50 },
	2: { x: -40, y: -10, type: "sineWave",     val: 1 },
	3: { x: -20, y:  20, type: "squareWave",   val: 4 },
	4: { x:   0, y:   0, type: "sineWave",     val: 2 },
	5: { x:  10, y:  30, type: "triangleWave", val: 3 },
	6: { x:  50, y:  50, type: "stair",        val: 3 },
} );
</script>
