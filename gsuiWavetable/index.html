<script>
const elWT = $( "gsui-wavetable" );
const bpm = 120;

$( "#testCtrls" ).$onclick( e => {
	const dur = +e.target.dataset.keyDur;
	const cId = e.target.parentNode.dataset.wtposcurve;

	if ( dur ) {
		elWT.$get( 0 ).$startKey( "k0", cId, bpm, dur );
	}
} );

elWT.$get( 0 ).$change( {
	waves: {
		0: {
			index: 0,
			curve: GSUmathWaveSine( 1024, 0 ),
		},
		1: {
			index: 1,
			curve: GSUmathWaveSquare( 1024, 0 ),
		},
	},
	// wtposCurves: {

} );
</script>
