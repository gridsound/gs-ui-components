<style>
:root {
	--TryMe-w: 300px;
	--TryMe-h: 300px;
}
#TryControls label {
	display: flex;
	align-items: center;
	gap: 8px;
}
</style>

<div id="TryComponent">
	<gsui-beatlines
		timedivision="4/4"
		pxperbeat="64"
		color="#fff"
		coloredodds
	></gsui-beatlines>
</div>

<div id="TryControls">
	<label>
		<input type="checkbox" id="vertical"/>
		<span>toggle vertical</span>
	</label>
	<label>
		<input type="checkbox" id="coloredodds" checked/>
		<span>toggle colored odds</span>
	</label>
	<div>
		<input id="pxPerBeat" type="range" value="64" min="1" max="200" step="1"/>
		<b>64</b>
		<span>pxPerBeat</span>
	</div>
	<div>
		<input id="beatsPerMeasure" type="range" value="4" min="1" max="16" step="1"/>
		<b>4</b>
		<span>beatsPerMeasure</span>
	</div>
	<div>
		<input id="stepsPerBeat" type="range" value="4" min="1" max="16" step="1"/>
		<b>4</b>
		<span>stepsPerBeat</span>
	</div>
</div>

<script>
const uiBeatlines = $( "gsui-beatlines" );
const inputPPB = $( "#pxPerBeat" );
const inputBPM = $( "#beatsPerMeasure" );
const inputSPB = $( "#stepsPerBeat" );

$( "#coloredodds" ).$onclick( () => uiBeatlines.$togAttr( "coloredodds" ) );
$( "#vertical" ).$onclick( () => uiBeatlines.$togAttr( "vertical" ) );

// uiBeatlines.$setAttr( "color", "dodgerblue" );

$( [
	inputPPB,
	inputBPM,
	inputSPB,
] ).$oninput( e => {
	$( e.target ).$next().$text( e.target.value );
	uiBeatlines.$setAttr( {
		pxperbeat: inputPPB.$value(),
		timedivision: `${ inputBPM.$value() }/${ inputSPB.$value() }`,
	} );
} );
</script>
