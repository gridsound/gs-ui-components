<style>
:root {
	--TryMe-resize: none;
}
gsui-com-avatar {
	width: 140px;
	height: 140px;
}
</style>

<div id="TryComponent">
	<gsui-com-avatar></gsui-com-avatar>
</div>

<div id="TryControls">
	<div><label><input id="avatar" type="checkbox" /> avatar</label></div>
	<div><label><input id="ava404" type="checkbox" /> avatar 404</label></div>
</div>

<script>
const elCmp = $( "gsui-com-avatar" );
const avatar = $( "#avatar" );
const ava404 = $( "#ava404" );

avatar.$onchange( () => elCmp.$setAttr( "src", !avatar.$checked() ? false : "test-assets/avatar.jpg" ) );
ava404.$onchange( () => elCmp.$setAttr( "src", !ava404.$checked() ? false : "test-assets/ava404.jpg" ) );
</script>
