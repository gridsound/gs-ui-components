<style>
:root {
	--TryMe-w: 460px;
}
</style>

<div id="TryComponent">
	<gsui-lfo
		toggle
		timedivision="4/4"
		type="sine"
		delay="0"
		attack="1"
		speed="1"
		amp="1"
	></gsui-lfo>
</div>

<div id="TryControls">
	<label>
		<input type="checkbox" id="toggle" checked/>
		<span>toggle</span>
	</label>
	<select id="lfoTarget">
		<option value="gain">gain</option>
		<option value="detune">detune</option>
	</select>
	<br/><br/>
	<div>
		<span>BPM:</span>
		<input id="inpBPM" type="range" min="10" max="999" step="1" value="120" style="width:100px"/>
		<b id="bpm"></b>
	</div>
	<div>
		<span>startKey:</span>
		<button class="btnPlay" data-dur=".25">.25</button>
		<button class="btnPlay" data-dur=".5">.5</button>
		<button class="btnPlay" data-dur="1">1</button>
		<button class="btnPlay" data-dur="2">2</button>
		<button class="btnPlay" data-dur="4">4</button>
	</div>
	<div>
		<span>startKey (live):</span>
		<button id="btnPlayLive">live</button>
	</div>
</div>

<script>
const elLFO = $( "gsui-lfo" );
const inpToggle = $( "#toggle" );
const inpTarget = $( "#lfoTarget" );

inpToggle.$onchange( e => elLFO.$setAttr( "toggle", e.target.checked ) );
inpTarget.$onchange( e => elLFO.$setAttr( "lfo", e.target.value ) );

elLFO.$get( 0 ).$updateWave();

const btnsPlay = $( ".btnPlay" );
const btnPlayLive = $( "#btnPlayLive" );
const inpBPM = $( "#inpBPM" );
const spanBPM = $( "#bpm" );
let bpm = 0;

btnsPlay.$onclick( e => elLFO.$get( 0 ).$startKey( "key-0", bpm, +e.target.dataset.dur ) );
btnPlayLive.$on( "pointerdown", () => elLFO.$get( 0 ).$startKey( "keylive-0", bpm ) );
btnPlayLive.$onclick( () => elLFO.$get( 0 ).$stopKey( "keylive-0" ) );
inpBPM.$oninput( () => spanBPM.$text( bpm = +inpBPM.$value() ) );
inpBPM.$trigger( "oninput" );
</script>
