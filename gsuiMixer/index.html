<style>
:root {
	--TryMe-w: 600px;
	--TryMe-h: 300px;
}
</style>

<div id="TryComponent">
	<gsui-mixer></gsui-mixer>
</div>

<script>
const mix = $( "gsui-mixer" );
const chans = mix.$get( 0 ).$getChannels();
const fxs = mix.$get( 0 ).$getEffects();

chans.$addChannel( "0" );
chans.$changeChannelProp( "0", "name", "main" );
chans.$addChannel( "1" );
chans.$addChannel( "2" );
chans.$addChannel( "3" );
chans.$addChannel( "4" );
chans.$changeChannelProp( "1", "order", 0 );
chans.$changeChannelProp( "2", "order", 1 );
chans.$changeChannelProp( "3", "order", 2 );
chans.$changeChannelProp( "4", "order", 3 );
chans.$changeChannelProp( "4", "name", "secret chan" );
chans.$getChannel( "1" ).$get( 0 ).$addEffect( "0", { type: "delay" } );
chans.$getChannel( "1" ).$get( 0 ).$addEffect( "1", { type: "filter" } );
chans.$getChannel( "1" ).$get( 0 ).$addEffect( "2", { type: "filter" } );
chans.$getChannel( "2" ).$get( 0 ).$addEffect( "2", { type: "filter" } );
chans.$getChannel( "1" ).$get( 0 ).$updateEffect( "2", { order: -1, toggle: false } );
fxs.$addEffect( "1", { type: "filter" } );
fxs.$changeEffect( "1", "toggle", true );
</script>
