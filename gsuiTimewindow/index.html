<style>
:root {
	--TryMe-w: 480px;
	--TryMe-h: 300px;
}
.gsuiTimewindow-line {
	height: var( --gsuiTimewindow-lineH );
}
.gsuiTimewindow-lineIn {
	box-sizing: border-box;
	position: relative;
	height: 100%;
	font-size: var( --gsuiTimewindow-pxperbeat );
	border-bottom: 1px solid #0004;
}
.gsuiTimewindow-lineItem {
	position: absolute;
	width: .25em;
	height: 100%;
	background-color: #ddfd;
}
.gsuiTimewindow-contentDown { background-color: #5c7; }
.gsuiTimewindow-panelContentDown { background-color: #38e; }

.myRow {
	box-sizing: border-box;
	height: var( --gsuiTimewindow-lineH );
	line-height: var( --gsuiTimewindow-lineH );
	padding-left: 1ch;
	color: #fff5;
	font-family: monospace;
	border-bottom: 1px solid #0004;
}
</style>

<div id="TryComponent">
	<gsui-timewindow downpanel timedivision="4/4" pxperbeat="60"></gsui-timewindow>
</div>

<div id="TryControls">
	<label>
		<input id="disabled" type="checkbox" name="disabled"/>
		<span>disabled</span>
	</label>
	<label>
		<input id="autoscroll" type="checkbox" name="autoscroll"/>
		<span>auto-scrolling</span>
	</label>
	<button id="playStop" type="button" name="playStop">Play!</button>
</div>

<script>
const win = $( "gsui-timewindow" );
const inpDisabled = $( "#disabled" );
const inpAutoscroll = $( "#autoscroll" );
const inpPlayStop = $( "#playStop" );
const tracks = [];
const rows = [];
let play = false;
let intervalId = 0;
let currenttime = 0;

win.$listen( {
	[ GSEV_TIMEWINDOW_PXPERBEAT ]: GSUnoop,
} );

inpDisabled.$onchange( () => win.$disabled( inpDisabled.$checked() ) );
inpAutoscroll.$onchange( () => win.$setAttr( "autoscroll", inpAutoscroll.$checked() ) );

inpPlayStop.$onclick( e => {
	play = !play;
	e.target.textContent = play ? "Stop" : "Play!" ;
	if ( play ) {
		intervalId = GSUsetInterval( () => {
			currenttime = ( currenttime + .05 ) % 16;
			win.$setAttr( "currenttime", currenttime );
		}, .05 );
	} else {
		GSUclearInterval( intervalId );
		currenttime = 0;
		win.$setAttr( "currenttime", 0 );
	}
	win.$setAttr( "playing", play );
} );

for ( let i = 0; i < 10; ++i ) {
	tracks.push( $.$div( { class: "myRow" }, `track ${ i }` ) );
	rows.push( $.$div( { class: "myRow" }, `row ${ i }` ) );
}
win.$get( 0 ).$appendPanel( ...tracks );
$( ".gsuiTimewindow-rows" ).$append( ...rows );

inpAutoscroll.$click();
// inpPlayStop.$click();
</script>
