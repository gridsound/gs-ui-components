<style>
:root {
	--TryMe-w: 120px;
	--TryMe-h: 280px;
}
</style>

<div id="TryComponent">
	<gsui-keys octaves="4 2" rootoctave="2"></gsui-keys>
</div>

<div id="TryControls">
	<button id="toggleOrient">Toggle orient</button>
</div>

<script>
const uiKeys = $( "gsui-keys" );
const togOrient = $( "#toggleOrient" );
const wrap = $( "#TryComponent" );

togOrient.$onclick( () => {
	const isHori = uiKeys.$getAttr( "orient" ) === "horizontal";
	const width = wrap.$get( 0 ).offsetWidth;
	const height = wrap.$get( 0 ).offsetHeight;

	wrap
		.$width( height, "px" )
		.$height( width, "px" );
	uiKeys.$setAttr( "orient", isHori ? "vertical" : "horizontal" );
} );
// togOrient.$click();
</script>
