<script src="test-assets/componentList.js"></script>
<script>
"use strict";

class TryMe {
	static $init() {
		$body
			.$setAttr( "data-skin", "gray" )
			.$addEventListener( "gsui", ( { detail: d } ) => {
				console.warn( `gsui event: "${ d.$event }"`, d.$args, d.$target );
			} );
		$( "#TryYear" ).$text( new Date().getFullYear() );
		$( "#TryBack" ).$onclick( () => top.location = `${ location.origin }${ location.pathname }`.split( "/try" )[ 0 ] );
		$( "#TrySelect" )
			.$append( ...componentList.map( c => $.$option( { value: c } ) ) )
			.$onchange( e => location.hash = e.target.value );
		window.onhashchange = () => location.reload();
		TryMe.#loadComponent( location.hash.slice( 1 ) );
	}
	static #clear() {
		$( ".TryAsset, #TryComponent, #TryControls" ).$remove();
	}
	static #loadComponent( cmp ) {
		TryMe.#clear();
		$( "#TrySelect" ).$value( cmp );
		fetch( `${ cmp }/index.html` )
			.then( res => res.text() )
			.then( TryMe.#appendElements );
	}
	static #appendElements( txt ) {
		const wrap = $.$div();
		let txt2 = txt;
		let css;
		let js;

		if ( txt2.includes( "<style>" ) ) {
			css = txt2.split( "<style>" )[ 1 ].split( "</style>" )[ 0 ].trim();
			txt2 = txt2.replace( /<style>(.|\n)*<\/style>/, "" );
		}
		if ( txt2.includes( "<script>" ) ) {
			js = txt2.split( "<script>" )[ 1 ].split( "</scr" + "ipt>" )[ 0 ].trim();
			txt2 = txt2.replace( /<script>(.|\n)*<\/script>/, "" );
		}
		if ( css ) {
			$( "<style>" ).$text( css ).$appendTo( $head );
		}
		wrap.innerHTML = txt2;
		$( wrap ).$children().$afterTo( $( "#TryHead" ) );
		if ( js ) {
			$( "<script>" ).$text( js ).$appendTo( $body );
		}
	}
}

TryMe.$init();
</script>
