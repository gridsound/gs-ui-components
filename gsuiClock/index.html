<style>
:root {
	--TryMe-resize: none;
}
</style>

<div id="TryComponent">
	<gsui-clock mode="second" bpm="60" timedivision="4/4"></gsui-clock>
</div>

<div id="TryControls">
	<input id="time" type="range" value="0" min="0" max="260" step=".1"/>
</div>

<script>
const elClock = $( "gsui-clock" );
const elInput = $( "#time" );

elInput
	.$oninput( () => elClock.$get( 0 ).$setTime( +elInput.$value() ) )
	.$trigger( "oninput" );
</script>
