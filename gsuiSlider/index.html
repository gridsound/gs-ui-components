<style>
:root {
	--TryMe-w: 340px;
	--TryMe-h: 120px;
}
#slider-wrap {
	display: flex;
	height: 100%;
	gap: 8px;
	--gsuiSlider-lineBgColor: #444;

	> div {
		flex: 1;
		display: flex;
		gap: inherit;

		&:first-child {
			flex-direction: column;
		}
		&:first-child + div {
			flex: .6;
			flex-direction: column;
		}
	}
}
gsui-slider {
	--gsuiSlider-event-catcher-inset: -4px;

	&.s0,
	&.s1,
	&.s2,
	&.s3,
	&.s4 {
		width: 100%;
		height: 8px;
		min-width: 32px;
		--gsuiSlider-lineColor: #ff9;
	}
	&.s3 {
		--gsuiSlider-lineColor: #ddf;
		height: 16px;
	}
	&.s4 {
		--gsuiSlider-lineColor: #a8b;
		min-height: 8px;
		flex: 1;
	}
	&.s5,
	&.s6,
	&.s7,
	&.s8,
	&.s9 {
		width: 8px;
		height: 100%;
		--gsuiSlider-lineColor: #c5426e;
	}
	&.s8 {
		--gsuiSlider-lineColor: #fff;
		width: 16px;
	}
	&.s9 {
		--gsuiSlider-lineColor: #7b8;
		min-width: 8px;
		flex: 1;
	}
	&.sc1,
	&.sc2 {
		--gsuiSlider-lineColor: #cbf;
		min-width: 16px;
	}
	&.sc2 {
		--gsuiSlider-lineColor: #db7;
	}
}
</style>

<div id="TryComponent">
	<div id="slider-wrap">
		<div>
			<gsui-slider class="s0" type="linear-x" min="0"   max="100" step="1"  value="25" mousemove-size="200" defaultValue="0"></gsui-slider>
			<gsui-slider class="s1" type="linear-x" min="0"   max="100" step="10" value="50" mousemove-size="200" defaultValue="100"></gsui-slider>
			<gsui-slider class="s2" type="linear-x" min="-50" max="50"  step="1"  value="25" mousemove-size="200" defaultValue="0"></gsui-slider>
			<gsui-slider class="s3" type="linear-x" min="0"   max="100" step="1"  value="25" mousemove-size="200"></gsui-slider>
			<gsui-slider class="s4" type="linear-x" min="0"   max="100" step="1"  value="75" mousemove-size="200"></gsui-slider>
		</div>
		<div>
			<gsui-slider class="sc1" type="circular" min="0"   max="100" step="1" value="25" mousemove-size="200" stroke-width="8" defaultValue="0"></gsui-slider>
			<gsui-slider class="sc2" type="circular" min="-50" max="50"  step="1" value="25" mousemove-size="200" stroke-width="8" defaultValue="0"></gsui-slider>
		</div>
		<div>
			<gsui-slider class="s5" type="linear-y" min="0"   max="100" step="1"  value="25" mousemove-size="200"></gsui-slider>
			<gsui-slider class="s6" type="linear-y" min="0"   max="100" step="10" value="50" mousemove-size="200"></gsui-slider>
			<gsui-slider class="s7" type="linear-y" min="-50" max="50"  step="1"  value="25" mousemove-size="200"></gsui-slider>
			<gsui-slider class="s8" type="linear-y" min="0"   max="100" step="1"  value="25" mousemove-size="200"></gsui-slider>
			<gsui-slider class="s9" type="linear-y" min="0"   max="100" step="1"  value="75" mousemove-size="200"></gsui-slider>
		</div>
	</div>
</div>

<div id="TryControls">
	<label>
		<input type="checkbox" id="inpDisabled"/>
		<span>disabled</span>
	</label>
</div>

<script>
const sli = $( "gsui-slider" );
const inpDisabled = $( "#inpDisabled" );

inpDisabled.$onchange( e => sli.$disabled( inpDisabled.$checked() ) );
</script>
