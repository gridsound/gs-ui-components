<style>
:root {
	--TryMe-w: 200px;
	--TryMe-h: 300px;
}
gsui-analyser-hist {
	height: 100%;
}
</style>

<div id="TryComponent">
	<gsui-analyser-hist></gsui-analyser-hist>
</div>

<div id="TryControls">
	<button id="play" disabled>play</button>
	<button id="stop">stop</button>
	<select id="type">
		<option value="hz">type="hz"</option>
		<option value="td">type="td"</option>
	</select>
</div>

<script>
const play = $( "#play" );
const stop = $( "#stop" );
const type = $( "#type" );
const analyser = $( "gsui-analyser-hist" );
const ctx = GSUaudioContext();
const anL = GSUaudioAnalyser( ctx );
const anR = GSUaudioAnalyser( ctx );
const split = GSUaudioChannelSplitter( ctx, 2 );
const fftSize = 2048;
const anLData = new Float32Array( fftSize / 2 );
const anRData = new Float32Array( fftSize / 2 );
let buffer;
let absn;

analyser.$setAttr( "resolution", "400 500" );

anL.fftSize = fftSize;
anR.fftSize = fftSize;
anL.smoothingTimeConstant = 0;
anR.smoothingTimeConstant = 0;

split.connect( anL, 0 );
split.connect( anR, 1 );

fetch( "test-assets/Cymatics-IcedOut.wav" )
	.then( res => res.arrayBuffer() )
	.then( arr => ctx.decodeAudioData( arr ) )
	.then( buf => {
		buffer = buf;
		play.$disabled( false );
	} );

type.$onchange( () => {
	analyser.$setAttr( "type", type.$value() );
} );
stop.$onclick( () => {
	absn?.stop();
} );
play.$onclick( () => {
	stop.$click();
	absn = GSUaudioBufferSource( ctx );
	absn.buffer = buffer;
	absn.loop = true;
	absn.connect( split );
	absn.connect( ctx.destination );
	absn.start();
} );

function frame() {
	switch ( type.$value() ) {
		case "hz":
			anL.getFloatFrequencyData( anLData );
			anR.getFloatFrequencyData( anRData );
			break;
		case "td":
			anL.getFloatTimeDomainData( anLData );
			anR.getFloatTimeDomainData( anRData );
			break;
	}
	analyser.$get( 0 ).$draw( anLData, anRData );
}

GSUsetInterval( frame, 0 );
</script>
