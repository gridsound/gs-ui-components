<style>
:root {
	--TryMe-w: 450px;
}
</style>

<div id="TryComponent">
	<gsui-noise gain=".5" pan="-.25"></gsui-noise>
</div>

<div id="TryControls">
	<label>
		<input type="checkbox" id="toggle" checked/>
		<span>toggle</span>
	</label>
</div>

<script>
const noi = $( "gsui-noise" );
const inpToggle = $( "#toggle" );

inpToggle
	.$onchange( () => noi.$setAttr( "toggle", inpToggle.$checked() ) )
	.$trigger( "onchange" );
</script>
