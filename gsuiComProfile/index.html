<style>
:root {
	--TryMe-w: 320px;
	--TryMe-w: 530px;
	--TryMe-resize: horizontal;
}
</style>

<div id="TryComponent">
	<gsui-com-profile
		lastname="Wick"
		firstname="John"
		username="baba_yaga"
		followers="2"
	></gsui-com-profile>
</div>

<div id="TryControls">
	<div><label><input id="height" type="range" min="0" max="1" value="1" step=".01" style="width:80px" /> height-mul <b>1</b></label></div>
	<div><label><input id="itsme" type="checkbox" /> itsme</label></div>
	<div><label><input id="avatar" type="checkbox" /> avatar</label></div>
	<div><label><input id="email" type="checkbox" /> email</label></div>
	<div><label><input id="emailpublic" type="checkbox" /> email public</label></div>
	<div><label><input id="emailtoverify" type="checkbox" /> email to verify</label></div>
	<div><label><input id="emailsending" type="checkbox" /> email sending</label></div>
	<div><label><input id="emailsent" type="checkbox" /> email sent</label></div>
	<div><label><input id="savefail" type="checkbox" /> saving will fail</label></div>
	<div><label><input id="followed" type="checkbox" /> followed</label></div>
</div>

<script>
const el = $( "gsui-com-profile" );
const height = $( "#height" );

$( "#itsme"         ).$onchange( () => el.$togAttr( "itsme" ) );
$( "#email"         ).$onchange( () => el.$setAttr( "email", el.$getAttr( "email" ) ? false : "john.wick@hitman.com" ) );
$( "#emailpublic"   ).$onchange( () => el.$togAttr( "emailpublic" ) );
$( "#emailtoverify" ).$onchange( () => el.$togAttr( "emailtoverify" ) );
$( "#emailsending"  ).$onchange( () => el.$togAttr( "emailsending" ) );
$( "#emailsent"     ).$onchange( () => el.$togAttr( "emailsent" ) );
$( "#avatar"        ).$onchange( () => el.$setAttr( "avatar", el.$getAttr( "avatar" ) ? false : "test-assets/avatar.jpg" ) );
$( "#followed"      ).$onchange( () => el.$togAttr( "followed" ) );

height.$oninput( () => {
	el.$css( "--gsuiComProfile-height-mul", height.$value() );
	height.$next().$text( height.$value() );
} );

el.$get( 0 ).$setVerifyEmailCallbackPromise( promRes );
el.$get( 0 ).$setFollowCallbackPromise( promFollow );

$( "#itsme" ).$click();
$( "#email" ).$click();
// $( "#emailpublic" ).$click();
$( "#emailtoverify" ).$click();
$( "#avatar" ).$click();
// $( "#followed" ).$click();

function promFollow() {
	return GSUwait( 1 ).then( GSUnoop );
}
function promRes( obj ) {
	return new Promise( ( res, rej ) => {
		GSUsetTimeout( () => {
			$( "#savefail" ).$checked() ? rej( "Error in the server or somewhere else.. who knows?" ) : res();
		}, 1 );
	} );
}
</script>
