<style>
:root {
	--TryMe-w: 320px;
	--TryMe-resize: none;
}
gs-flex div {
	display: flex;
	align-items: center;
	justify-content: center;
	font-size: 11px;
	width: 80px;
	height: 40px;
	margin: 10px;
	background: #fff5;

	&[ data-cur="default"     ] { cursor: var( --gsuiCursor-default ) }
	&[ data-cur="pointer"     ] { cursor: var( --gsuiCursor-pointer ) }
	&[ data-cur="ew-resize"   ] { cursor: var( --gsuiCursor-ew-resize ) }
	&[ data-cur="e-resize"    ] { cursor: var( --gsuiCursor-e-resize ) }
	&[ data-cur="w-resize"    ] { cursor: var( --gsuiCursor-w-resize ) }
	&[ data-cur="ns-resize"   ] { cursor: var( --gsuiCursor-ns-resize ) }
	&[ data-cur="nesw-resize" ] { cursor: var( --gsuiCursor-nesw-resize ) }
	&[ data-cur="nwse-resize" ] { cursor: var( --gsuiCursor-nwse-resize ) }
	&[ data-cur="move"        ] { cursor: var( --gsuiCursor-move ) }
	&[ data-cur="grab"        ] { cursor: var( --gsuiCursor-grab ) }
	&[ data-cur="grabbing"    ] { cursor: var( --gsuiCursor-grabbing ) }
	&[ data-cur="col-resize"  ] { cursor: var( --gsuiCursor-col-resize ) }
	&[ data-cur="row-resize"  ] { cursor: var( --gsuiCursor-row-resize ) }
	&::before {
		content: attr( data-cur );
	}
	&[ data-cur="grab" ]:active {
		cursor: var( --gsuiCursor-grabbing );
	}
}
</style>

<div id="TryComponent">
	<gs-flex x g8 wrap>
		<div tabindex="0" data-cur="default"></div>
		<div tabindex="0" data-cur="pointer"></div>
		<div tabindex="0" data-cur="ew-resize"></div>
		<div tabindex="0" data-cur="e-resize"></div>
		<div tabindex="0" data-cur="w-resize"></div>
		<div tabindex="0" data-cur="ns-resize"></div>
		<div tabindex="0" data-cur="nesw-resize"></div>
		<div tabindex="0" data-cur="nwse-resize"></div>
		<div tabindex="0" data-cur="move"></div>
		<div tabindex="0" data-cur="grab"></div>
		<div tabindex="0" data-cur="grabbing"></div>
		<div tabindex="0" data-cur="col-resize"></div>
		<div tabindex="0" data-cur="row-resize"></div>
	<gs-flex>
</div>
