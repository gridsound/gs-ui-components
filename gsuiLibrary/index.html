<style>
:root {
	--TryMe-w: 340px;
	--TryMe-h: 480px;
}
</style>

<div id="TryComponent">
	<gsui-library/>
</div>

<script>
const elLib = $( "gsui-library" );
const elLib0 = $( "gsui-library" ).$get( 0 );

elLib0.$setLibrary( gsuiLibrarySamples );
elLib.$setAttr( "placeholder", "hey, placeholder here" );
elLib0.$bookmarkSample( "clap-001", true );
elLib0.$bookmarkSample( "clap-013", true );
elLib0.$bookmarkSample( "hat-003", true );
elLib0.$bookmarkSample( "crash-001", true );
elLib.$listen( {
	[ GSEV_LIBRARY_LOADSAMPLE ]: ( _, smp ) => {
		elLib0.$loadSample( smp );
		GSUsetTimeout( () => elLib0.$readySample( smp ), 1 );
	},
	[ GSEV_LIBRARY_PLAYSAMPLE ]: ( _, smp ) => {
		elLib0.$playSample( smp, 1 );
	},
} );
</script>
