<style>
:root {
	--TryMe-w: 220px;
	--TryMe-h: 100px;
}
</style>

<div id="TryComponent">
	<gsui-time-cursors resolution="300"></gsui-time-cursors>
</div>

<div id="TryControls">
	<button class="playBtn" data-sec=".25">play 0.25 sec</button><br/>
	<button class="playBtn" data-sec="1">play 1 sec</button><br/>
	<button class="playBtn" data-sec="10">play 10 sec</button>
</div>

<script>
const uiTimeCursors = $( "gsui-time-cursors" );

$( ".playBtn" ).$onclick( e => uiTimeCursors.$message( GSEV_TIMECURSORS_PLAY, +e.target.dataset.sec ) );

GSUsetInterval( () => {
	uiTimeCursors.$message( GSEV_TIMECURSORS_DRAW );
}, 1 / 60 );
</script>
