<style>
:root {
	--TryMe-w: 220px;
	--TryMe-h: 100px;
}
</style>

<div id="TryComponent">
	<gsui-time-cursors resolution="300"></gsui-time-cursors>
</div>

<div id="TryControls">
	<gs-flex y g8>
		<gsui-com-button class="playBtn" data-sec=".25" text="play 0.25 sec"></gsui-com-button>
		<gsui-com-button class="playBtn" data-sec="1"   text="play 1 sec"></gsui-com-button>
		<gsui-com-button class="playBtn" data-sec="10"  text="play 10 sec"></gsui-com-button>
	</gs-flex>
</div>

<script>
const uiTimeCursors = $( "gsui-time-cursors" );

$( ".playBtn" ).$onclick( e => uiTimeCursors.$message( GSEV_TIMECURSORS_PLAY, +e.target.dataset.sec ) );

GSUsetInterval( () => {
	uiTimeCursors.$message( GSEV_TIMECURSORS_DRAW );
}, 1 / 60 );
</script>
