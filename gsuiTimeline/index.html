<style>
:root {
	--TryMe-w: 480px;
	--TryMe-resize: horizontal;
}
#wrapOut {
	overflow: auto;
}
#wrapIn {
	width: 10000px;
	height: 28px;
}
.prop {
	display: flex;
	align-items: center;
}
.prop span,
.prop b {
	margin-left: 1ch;
}
</style>

<div id="TryComponent">
	<div id="wrapOut">
		<div id="wrapIn">
			<gsui-timeline step="1" pxperbeat="80" loop="1.25-3.75" currenttime="1.25" timedivision="4/4"></gsui-timeline>
		</div>
	</div>
</div>

<div id="TryControls">
	<div class="prop">
		<input id="currentTimePreview" type="range" value="0" min="0" max="4" step=".001" />
		<span>currentTime preview</span>
		<b>0</b>
	</div>
	<div class="prop">
		<input id="currentTime" type="range" value="1.25" min="0" max="4" step=".001" />
		<span>currentTime</span>
		<b>1.25</b>
	</div>
	<div class="prop">
		<input id="pxPerbeat" type="range" value="80" min="2" max="128"/>
		<span>px per beat</span>
		<b>80</b>
	</div>
	<div class="prop">
		<input id="beatsPerMeasure" type="range" value="4" min="1" max="16"/>
		<span>beats per measure</span>
		<b>4</b>
	</div>
	<div class="prop">
		<input id="stepsPerBeat" type="range" value="4" min="1" max="16"/>
		<span>steps per beat</span>
		<b>4</b>
	</div>
</div>

<script>
const timeline = $( "gsui-timeline" );
const inpTPr = $( "#currentTimePreview" );
const inpTim = $( "#currentTime" );
const inpPBB = $( "#pxPerbeat" );
const inpBPM = $( "#beatsPerMeasure" );
const inpSPB = $( "#stepsPerBeat" );

inpTPr.$oninput( e => timeline.$setAttr( "currenttime-preview", inpTPr.$value() ) );
inpTim.$oninput( e => timeline.$setAttr( "currenttime", inpTim.$value() ) );
inpPBB.$oninput( e => timeline.$setAttr( "pxperbeat", inpPBB.$value() ) );
$( [
	inpBPM,
	inpSPB,
] ).$oninput( e => timeline.$setAttr( "timedivision", `${ inpBPM.$value() }/${ inpSPB.$value() }` ) );
$( "#TryControls" ).$oninput( e => $( e.target ).$next().$next().$text( e.target.value ) );
</script>
