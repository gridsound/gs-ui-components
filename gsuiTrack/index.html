<style>
:root {
	--TryMe-w: 160px;
	--TryMe-h: 60px;
}
</style>

<div id="TryComponent">
	<gsui-track name="" order="20"></gsui-track>
</div>

<div id="TryControls">
	<label>
		<input id="mute" type="checkbox"/>
		<span>mute</span>
	</label>
</div>

<script>
const tr = $( "gsui-track" );
const mute = $( "#mute" );

mute.$onchange( () => tr.$setAttr( "mute", mute.$checked() ) );
</script>
