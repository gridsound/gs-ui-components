<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1"/>
<link rel="shortcut icon" href="../assets/ico.svg"/>
<link rel="stylesheet" href="../assets/fonts/fonts.css"/>

<!-- ....................................................................... -->
<link rel="stylesheet" href="../gsui.css"/>
<link rel="stylesheet" href="../gsui-gray.css"/>
<link rel="stylesheet" href="../gsui-white.css"/>
<link rel="stylesheet" href="../gsui-flex.css"/>
<link rel="stylesheet" href="../test-assets/test.css"/>

<!-- ....................................................................... -->
<link rel="stylesheet" href="../gsuiIcon/gsuiIcon.css"/>
<link rel="stylesheet" href="../gsuiCursor/gsuiCursor.css"/>
<link rel="stylesheet" href="../gsuiRipple/gsuiRipple.css"/>
<link rel="stylesheet" href="../gsuiComButton/gsuiComButton.css"/>

<!-- ....................................................................... -->
<link rel="stylesheet" href="gsuiPopup.css"/>

<!-- ....................................................................... -->
<style>
body {
	--test-content-resize: none;
}
#testWrap {
	display: flex;
	flex-wrap: wrap;
	align-content: flex-start;
	gap: 12px;
	max-width: 230px;
}
</style>
</head>
<body>

<!-- ....................................................................... -->
<div id="TEST">
	<gsui-com-button text="alert"></gsui-com-button>
	<gsui-com-button text="confirm"></gsui-com-button>
	<gsui-com-button text="prompt"></gsui-com-button>
	<gsui-com-button text="custom" type="submit"></gsui-com-button>
</div>
<div id="TEST-CTRLS">
</div>

<!-- ....................................................................... -->
<script src="../gs-utils/gs-utils.js"></script>
<script src="../gs-utils/gs-utils-math.js"></script>
<script src="../gs-utils/gs-utils-func.js"></script>
<script src="../gs-utils/gs-utils-jquery.js"></script>
<script src="../test-assets/test.js"></script>
<script src="../gsui-constantes.js"></script>
<script src="../gsui0ne/gsui0ne.js"></script>

<!-- ....................................................................... -->
<script src="../gsuiRipple/gsuiRipple.js"></script>
<script src="../gsuiComButton/gsuiComButton.js"></script>

<!-- ....................................................................... -->
<script src="gsuiPopup.html.js"></script>
<script src="gsuiPopup.js"></script>

<!-- ....................................................................... -->
<script>
$( "gsui-com-button[text='alert']"   ).$onclick( () => $popup.$alert(   "Error 2025", "Should reboot everything!"           ).then( lg.bind( null, "$popup.$alert"   ) ) );
$( "gsui-com-button[text='confirm']" ).$onclick( () => $popup.$confirm( "Error 2025", "Should we reboot the system?"        ).then( lg.bind( null, "$popup.$confirm" ) ) );
$( "gsui-com-button[text='prompt']"  ).$onclick( () => $popup.$prompt(  "Error 2025", "Name the new report:", "Lorem ipsum" ).then( lg.bind( null, "$popup.$prompt"  ) ) );

const customContent =
	$.$elem( "fieldset", { style: "display:flex; flex-direction:column; gap:6px" },
		$.$elem( "legend", null, "custom content" ),
		$.$label( { style: "display:flex; align-items:center" },
			$.$span( { style: "width:100px" }, "username" ),
			$.$input( { type: "text", name: "username", required: true, placeholder: "neo", style: "border:0; border-radius:4px; padding:4px 6px; font:inherit" } ),
		),
		$.$label( { style: "display:flex; align-items:center" },
			$.$span( { style: "width:100px" }, "password" ),
			$.$input( { type: "password", name: "password", required: true, placeholder: "1234", style: "border:0; border-radius:4px; padding:4px 6px; font:inherit" } ),
		),
	);

$( "gsui-com-button[text='custom']" ).$onclick( () => {
	$popup.$custom( {
		title: "Custom title",
		cancel: "Cancel",
		noOverlayCancel: true,
		element: customContent,
		submit: obj => obj.username.toLowerCase() === "neo" && obj.password === "1234",
	} ).then( lg.bind( null, "$popup.$custom" ) );
} );

// $( "gsui-com-button[text='custom']" ).$click();
</script>
</body>
</html>
