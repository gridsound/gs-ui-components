<style>
:root {
	--TryMe-resize: none;
}
</style>

<div id="TryComponent">
	<gsui-com-button text="alert"></gsui-com-button>
	<gsui-com-button text="confirm"></gsui-com-button>
	<gsui-com-button text="prompt"></gsui-com-button>
	<gsui-com-button text="custom" type="submit"></gsui-com-button>
</div>

<script>
$( "gsui-com-button[text='alert']"   ).$onclick( () => $popup.$alert(   "Error 2025", "Should reboot everything!"           ).then( lg.bind( null, "$popup.$alert"   ) ) );
$( "gsui-com-button[text='confirm']" ).$onclick( () => $popup.$confirm( "Error 2025", "Should we reboot the system?"        ).then( lg.bind( null, "$popup.$confirm" ) ) );
$( "gsui-com-button[text='prompt']"  ).$onclick( () => $popup.$prompt(  "Error 2025", "Name the new report:", "Lorem ipsum" ).then( lg.bind( null, "$popup.$prompt"  ) ) );

const customContent =
	$.$elem( "fieldset", { style: "display:flex; flex-direction:column; gap:6px" },
		$.$elem( "legend", null, "custom content" ),
		$.$label( { style: "display:flex; align-items:center" },
			$.$span( { style: "width:100px" }, "username" ),
			$.$input( { type: "text", name: "username", required: true, placeholder: "neo", style: "border:0; border-radius:4px; padding:4px 6px; font:inherit" } ),
		),
		$.$label( { style: "display:flex; align-items:center" },
			$.$span( { style: "width:100px" }, "password" ),
			$.$input( { type: "password", name: "password", required: true, placeholder: "1234", style: "border:0; border-radius:4px; padding:4px 6px; font:inherit" } ),
		),
	);

$( "gsui-com-button[text='custom']" ).$onclick( () => {
	$popup.$custom( {
		title: "Custom title",
		cancel: "Cancel",
		noOverlayCancel: true,
		element: customContent,
		submit: obj => obj.username.toLowerCase() === "neo" && obj.password === "1234",
	} ).then( lg.bind( null, "$popup.$custom" ) );
} );

// $( "gsui-com-button[text='custom']" ).$click();
</script>
