<style>
:root {
	--TryMe-w: 460px;
}
</style>

<div id="TryComponent">
	<gsui-envelope toggle timedivision="4/4" attack=".25" hold=".15" decay=".1" sustain=".7" amp="12" release="1"></gsui-envelope>
</div>

<div id="TryControls">
	<label>
		<input id="inpToggle" type="checkbox" checked/>
		<span>toggle</span>
	</label>
	<select id="inpTarget">
		<option value="gain">gain</option>
		<option value="detune" selected>detune</option>
		<option value="lowpass">lowpass</option>
	</select>
	<br/><br/>
	<div>
		<span>BPM:</span>
		<input id="inpBPM" type="range" min="10" max="999" step="1" value="120" style="width:100px"/>
		<b id="bpm"></b>
	</div>
	<div>
		<span>startKey:</span>
		<button class="btnPlay" data-dur=".25">.25</button>
		<button class="btnPlay" data-dur=".5">.5</button>
		<button class="btnPlay" data-dur="1">1</button>
		<button class="btnPlay" data-dur="2">2</button>
		<button class="btnPlay" data-dur="4">4</button>
	</div>
	<div>
		<span>startKey (live):</span>
		<button id="btnPlayLive">live</button>
	</div>
</div>

<script>
const elEnv = $( "gsui-envelope" );
const inpToggle = $( "#inpToggle" );
const inpTarget = $( "#inpTarget" );
const btnsPlay = $( ".btnPlay" );
const btnPlayLive = $( "#btnPlayLive" );
const inpBPM = $( "#inpBPM" );
const spanBPM = $( "#bpm" );
let bpm = 0;

inpToggle.$onchange( e => elEnv.$setAttr( "toggle", inpToggle.$checked() ) );
inpTarget.$onchange( e => elEnv.$setAttr( "env", inpTarget.$value() ) );
inpTarget.$trigger( "onchange" );

btnsPlay.$onclick( e => elEnv.$get( 0 ).$startKey( "key-0", bpm, +e.target.dataset.dur ) );
btnPlayLive.$on( "pointerdown", () => elEnv.$get( 0 ).$startKey( "keylive-0", bpm ) );
btnPlayLive.$onclick( () => elEnv.$get( 0 ).$stopKey( "keylive-0" ) );
inpBPM.$oninput( () => spanBPM.$text( bpm = +inpBPM.$value() ) );
inpBPM.$trigger( "oninput" );
</script>
