<style>
:root {
	--TryMe-w: 400px;
	--TryMe-h: 300px;
}
gsui-analyser-hz {
	height: 100%;
}
</style>

<div id="TryComponent">
	<gsui-analyser-hz></gsui-analyser-hz>
</div>

<div id="TryControls">
	<gsui-com-button id="play" icon="play" disabled></gsui-com-button>
	<gsui-com-button id="stop" icon="stop"></gsui-com-button>
	<select id="bgcolor">
		<option value="transparent">transparent</option>
		<option value="rgb(0 0 0)">rgb(0 0 0)</option>
		<option value="rgb(50 50 50)">rgb(50 50 50)</option>
		<option value="rgb(50 50 200)">rgb(50 50 200)</option>
		<option value="rgb(255 0 0)">rgb(255 0 0)</option>
	</select>
	<input id="gain" type="range" min="0" max="1" step=".001" value="1"/>
</div>

<script>
const play = $( "#play" );
const stop = $( "#stop" );
const gain = $( "#gain" );
const bgcolor = $( "#bgcolor" );
const spectrum = $( "gsui-analyser-hz" );
const ctx = GSUaudioContext();
const an = GSUaudioAnalyser( ctx );
const gainNode = GSUaudioGain( ctx );
const fftSize = 4096;
const anData = new Float32Array( fftSize / 2 );
let buffer;
let absn;

spectrum.$setAttr( "resolution", 1024 );

an.fftSize = fftSize;
an.smoothingTimeConstant = 0;
gainNode.connect( an );
gainNode.connect( ctx.destination );

fetch( "test-assets/Cymatics-IcedOut.wav" )
	.then( res => res.arrayBuffer() )
	.then( arr => ctx.decodeAudioData( arr ) )
	.then( buf => {
		buffer = buf;
		play.$disabled( false );
	} );

gain.$oninput( () => GSUaudioParamSet( gainNode.gain, gain.$value() ) );
bgcolor.$onchange( () => spectrum.$css( "background-color", bgcolor.$value() ) );
stop.$onclick( () => absn?.stop() );
play.$onclick( () => {
	stop.$click();
	absn = GSUaudioBufferSource( ctx );
	absn.buffer = buffer;
	absn.loop = true;
	absn.connect( gainNode );
	absn.start();
} );

function frame() {
	an.getFloatFrequencyData( anData );
	spectrum.$get( 0 ).$draw( anData );
}

bgcolor.$trigger( "onchange" );

GSUsetInterval( frame, 0 );
</script>
