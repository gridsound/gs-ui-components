<style>
:root {
	--TryMe-w: 460px;
	--TryMe-h: 360px;
}
</style>

<div id="TryComponent">
	<gsui-slicer duration="8" timedivision="4/4"></gsui-slicer>
</div>

<div id="TryControls">
	<div>
		<button id="loadSample">Load a sample</button>
		<button id="rmSample">Unload</button>
		<button id="playSample">Play/Stop</button>
	</div>
	<div>
		<span>currentTime</span>
		<input id="currentTime" type="range" min="0" value="0" max="8" step=".001"/>
	</div>
</div>

<script>
const slicer = $( "gsui-slicer" );
const playSampleBtn = $( "#playSample" );
const currentTimeInp = $( "#currentTime" );
let ctx, buffer, absn;

slicer.$get( 0 ).$addSlice(  0, { x: .000, y: .000, w: .125 } );
slicer.$get( 0 ).$addSlice(  1, { x: .125, y: .125, w: .125 } );
slicer.$get( 0 ).$addSlice(  2, { x: .250, y: .250, w: .125 } );
slicer.$get( 0 ).$addSlice(  3, { x: .375, y: .375, w: .125 } );
slicer.$get( 0 ).$addSlice(  4, { x: .500, y: .500, w: .125 } );
slicer.$get( 0 ).$addSlice(  5, { x: .625, y: .625, w: .125 } );
slicer.$get( 0 ).$addSlice(  6, { x: .750, y: .750, w: .125 } );
slicer.$get( 0 ).$addSlice(  7, { x: .875, y: .875, w: .125 } );

slicer.$listen( {
	[ GSEV_SLICER_CHANGEPROP ]: ( _, prop, val ) => {
		playSampleBtn.$click().$click();
		if ( prop === "duration" ) {
			currentTimeInp.$setAttr( "max", val );
		}
	},
} );

currentTimeInp.$oninput( () => slicer.$setAttr( "currenttime", currentTimeInp.$value() ) );
playSampleBtn.$onclick( () => {
	if ( absn ) {
		absn.stop();
		absn = null;
	} else {
		absn = GSUaudioBufferSource( ctx );
		absn.buffer = gswaSlicer.$createBuffer( ctx, buffer, 0, 1, slicer.$get( 0 ).$getSlicesData() );
		absn.loop = true;
		absn.connect( ctx.destination );
		absn.start();
	}
} );
$( "#rmSample" ).$onclick( () => slicer.$get( 0 ).$removeBuffer() );
$( "#loadSample" ).$onclick( () => {
	ctx ||= GSUaudioContext();
	slicer.$get( 0 ).$removeBuffer();
	// fetch( "test-assets/i-just-dont-know-why_F_minor.wav" )
	// fetch( "test-assets/the_purge_siren_3.wav" )
	// fetch( "test-assets/mental-help-hotline.m4a" )
	// fetch( "test-assets/still-listening-gentleman.wav" )
	// fetch( "test-assets/56k.ogg" )
	// fetch( "test-assets/LCU_808_180_DLKit_03_Full.wav" )
	fetch( "test-assets/Too Long - Steam Machine.wav" )
	// fetch( "test-assets/Robot Rock - Oh Yeah.wav" )
	// fetch( "test-assets/Television Rules The Nation - Crescendolls.wav" )
		.then( res => res.arrayBuffer() )
		.then( arr => ctx.decodeAudioData( arr ) )
		.then( buf => {
			buffer = buf;
			slicer.$get( 0 ).$setBuffer( buf );
			slicer.$get( 0 ).$setBufferName( "my-super-sample" );
		} );
} );
</script>
