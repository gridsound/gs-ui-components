<style>
:root {
	--TryMe-w: 500px;
	--TryMe-h: 280px;
}
gsui-windows {
	background-color: #111;
}
</style>

<div id="TryComponent">
	<gsui-windows></gsui-windows>
</div>

<div id="TryControls">
	<label>
		<input id="lowGraphics" type="checkbox"/>
		<span>low graphics</span>
	</label>
	<label>
		<input id="noMinimize" type="checkbox"/>
		<span>no minimize</span>
	</label>
	<div id="winBtns">
		<gsui-com-button data-ind="0" text="winA"></gsui-com-button>
		<gsui-com-button data-ind="1" text="winB"></gsui-com-button>
		<gsui-com-button data-ind="2" text="winC"></gsui-com-button>
	</div>
	<div>
		<gsui-com-button id="addContent" text="addContent"></gsui-com-button>
	</div>
</div>

<script>
const uiWins = $( "gsui-windows" );
const wins = $( [
	uiWins.$message( GSEV_WINDOWS_CREATE, "winA" ),
	uiWins.$message( GSEV_WINDOWS_CREATE, "winB" ),
	uiWins.$message( GSEV_WINDOWS_CREATE, "winC" ),
] );
const attrs = [
	{ x:  10, y: 10, w: 140, h: 100, icon: "buf-vocal", name: "Aaa" },
	{ x: 160, y: 10, w: 140, h: 100, icon: "buf-drum", name: "Bbb" },
	{ x: 310, y: 10, w: 140, h: 100, icon: "buf-fx", name: "Ccc" },
];

$( "#lowGraphics" ).$onchange( e => uiWins.$setAttr( "lowgraphics", e.target.checked ) );
$( "#noMinimize" ).$onchange( e => uiWins.$setAttr( "nominimize", e.target.checked ) );
$( "#winBtns gsui-com-button" ).$onclick( e => wins.$at( e.target.dataset.ind ).$addAttr( "show" ) );
$( "#addContent" ).$onclick( () => {
	wins.$at( 0 ).$message( GSEV_WINDOW_APPENDCONTENT, $.$span( { class: "myContent" }, "A" ) );
	wins.$at( 1 ).$message( GSEV_WINDOW_APPENDCONTENT, $.$span( { class: "myContent" }, "B" ) );
	wins.$at( 2 ).$message( GSEV_WINDOW_APPENDCONTENT, $.$span( { class: "myContent" }, "C" ) );
} );

wins.$setAttr( ( _, i ) => attrs[ i ] ).$addAttr( "show" );

$( "#addContent" ).$click();
</script>
